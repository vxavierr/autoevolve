<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>autoevolve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="grain-overlay"></div>

  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="1" y="1" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="17" y="1" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="1" y="17" width="10" height="10" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <rect x="17" y="17" width="10" height="10" rx="1" fill="currentColor"/>
          <line x1="14" y1="6" x2="14" y2="22" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
          <line x1="6" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
        </svg>
      </div>
      <div class="brand">
        <span class="brand-name">autoevolve</span>
        <span class="brand-tag">motor de melhoria autonoma</span>
      </div>
    </div>

    <div class="header-right">
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span id="system-status">rodando</span>
      </div>
      <span id="last-updated" class="last-updated">—</span>
      <button id="refresh-btn" title="Refresh data">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M13 7A6 6 0 1 1 7 1c1.66 0 3.16.67 4.24 1.76L13 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <polyline points="13,1 13,4 10,4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Atualizar
      </button>
    </div>
  </header>

  <main>
    <!-- Top row: 3 columns -->
    <div class="grid-top">
      <section class="panel panel--projects" id="panel-projects">
        <div class="panel-header">
          <span class="panel-eyebrow">workspace</span>
          <h2 class="panel-title">Projetos</h2>
          <span class="panel-badge" id="projects-count">—</span>
        </div>
        <div class="panel-body" id="projects-content">
          <div class="skeleton-lines">
            <div class="sk-line"></div><div class="sk-line sk-short"></div>
            <div class="sk-line"></div><div class="sk-line sk-short"></div>
          </div>
        </div>
      </section>

      <section class="panel panel--behavior" id="panel-behavior">
        <div class="panel-header">
          <span class="panel-eyebrow">analise de sinais</span>
          <h2 class="panel-title">Comportamento</h2>
        </div>
        <div class="panel-body" id="behavior-content">
          <div class="skeleton-lines">
            <div class="sk-line"></div><div class="sk-line sk-short"></div>
            <div class="sk-line"></div><div class="sk-line sk-short"></div>
          </div>
        </div>
      </section>

      <section class="panel panel--predictions" id="panel-predictions">
        <div class="panel-header">
          <span class="panel-eyebrow">modelo de risco</span>
          <h2 class="panel-title">Predicoes</h2>
        </div>
        <div class="panel-body" id="predictions-content">
          <div class="skeleton-lines">
            <div class="sk-line"></div><div class="sk-line sk-short"></div>
            <div class="sk-line"></div>
          </div>
        </div>
      </section>
    </div>

    <!-- Evolution: full width with big metrics -->
    <section class="panel panel--evolution" id="panel-evolution">
      <div class="panel-header">
        <span class="panel-eyebrow">codigo acima do llm</span>
        <h2 class="panel-title">Evolucao</h2>
      </div>
      <div class="panel-body" id="evolution-content">
        <div class="skeleton-lines">
          <div class="sk-line"></div><div class="sk-line sk-short"></div>
        </div>
      </div>
    </section>

    <!-- Recent Runs -->
    <section class="panel panel--runs" id="panel-runs">
      <div class="panel-header">
        <span class="panel-eyebrow">historico de execucao</span>
        <h2 class="panel-title">Execucoes Recentes</h2>
      </div>
      <div class="panel-body" id="runs-content">
        <div class="skeleton-lines">
          <div class="sk-line"></div><div class="sk-line"></div><div class="sk-line sk-short"></div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <span class="footer-copy">autoevolve &mdash; substituindo progressivamente decisoes do LLM por regras hardcoded</span>
    <span class="footer-cycle">ciclo 30s</span>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
